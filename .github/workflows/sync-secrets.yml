# Sync Secrets — 1Password → Convex deployment env vars.
#
# The canonical Supa secret flow (supa-framework `docs/SECRETS.md`): 1Password is
# the single source of truth. This workflow is the "sync ONLY when a secret
# changes" hop — it reads the allowlisted secrets from 1Password and pushes them
# to the Convex deployment with `convex env set`. It is MANUAL
# (`workflow_dispatch`) — NEVER on push, because 1Password rate-limits reads.
#
# It inherits the framework's sync-secrets pattern but reads the value inline
# (rather than the framework's `sync-secrets-to-convex.sh`, which reads the
# `credential` field) because events-os's items use the documented per-env
# fields `dev` / `staging` / `production` in the `Events` vault.
#
# ── One-time prerequisites (set by a maintainer) ────────────────────────────
#   - GitHub Actions secret `OP_SERVICE_ACCOUNT_TOKEN`: a 1Password service-
#     account token scoped READ-ONLY to the `Events` vault (the single bootstrap
#     secret — the only thing that lives in GitHub but not synced from 1Password).
#   - GitHub Actions secret `CONVEX_DEPLOY_KEY` (already set for deploy): its
#     encoded deployment is the target `convex env set` writes to.
#   - Each synced key exists in 1Password as a Secure Note named exactly like the
#     env var, in the `Events` vault, with a field matching the chosen environment.
#
# ── Usage ────────────────────────────────────────────────────────────────────
#   Run from the Actions tab (or `gh workflow run sync-secrets.yml -f environment=production`)
#   AFTER editing a secret in 1Password. `environment` selects which 1Password
#   FIELD (dev/staging/production) is read; events-os has a single Convex
#   deployment (production), so `production` is the normal choice.
name: Sync Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "1Password field to read (dev / staging / production)"
        type: choice
        options: [production, staging, dev]
        default: production
      keys:
        description: "Optional: only sync these space-separated keys (default: all allowlisted). Use for a safe first/targeted run, e.g. just the INCREASE_* keys."
        type: string
        default: ""

concurrency:
  group: sync-secrets
  cancel-in-progress: false

jobs:
  sync:
    name: Sync 1Password → Convex
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The Convex CLI ships with @events-os/convex; installing just it (and its
      # deps) needs GITHUB_TOKEN for the private @supa-media/convex package —
      # mirrors deploy-convex.yml.
      - name: Install backend dependencies
        run: pnpm install --filter @events-os/convex... --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Sync allowlisted secrets to Convex
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          FIELD: ${{ github.event.inputs.environment }}
          ONLY_KEYS: ${{ github.event.inputs.keys }}
        run: |
          set -euo pipefail
          VAULT="Events"
          # Optional targeted run: if `keys` was given, only those are synced.
          ONLY_KEYS=" ${ONLY_KEYS} "

          # ── Allowlist ──────────────────────────────────────────────────────
          # The Convex DEPLOYMENT env vars sourced from 1Password. A key not
          # listed here is never synced. (INCREASE_API_BASE is a config URL, not
          # a secret, but lives in 1Password per-env so the sandbox vs prod base
          # URL flows the same way — see .env.example.)
          KEYS=(
            JWT_PRIVATE_KEY
            JWKS
            # NOTE: the code reads PUBLIC_SITE_URL (apps/convex/lib/siteUrl.ts) and
            # APP_URL (deep link into the authenticated /os app) — the 1Password
            # item names below must match exactly, or the sync silently [skip]s.
            PUBLIC_SITE_URL
            APP_URL
            AUTH_EMAIL_FROM
            OPENROUTER_API_KEY
            RESEND_API_KEY
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY
            INCREASE_API_KEY
            INCREASE_WEBHOOK_SECRET
            INCREASE_PROGRAM_ID
            INCREASE_ENTITY_ID
            INCREASE_API_BASE
            INCREASE_SANDBOX_API_KEY
            INCREASE_SANDBOX_ENTITY_ID
          )

          synced=0; skipped=0; failed=0
          for KEY in "${KEYS[@]}"; do
            # Targeted-run filter: when `keys` is set, skip anything not named.
            if [ -n "${ONLY_KEYS// /}" ] && [[ "$ONLY_KEYS" != *" $KEY "* ]]; then
              continue
            fi
            # The INCREASE_SANDBOX_* vars have no items of their own — they ARE the
            # sandbox key/entity, so they always source from the `dev` field of the
            # base item regardless of the target environment. They let the single
            # /increase/webhook endpoint service sandbox webhooks (routed by the
            # `sandbox_` object-id prefix) + the runtime sandbox-mode toggle.
            if [ "$KEY" = "INCREASE_SANDBOX_API_KEY" ]; then
              OPREF="op://${VAULT}/INCREASE_API_KEY/dev"
            elif [ "$KEY" = "INCREASE_SANDBOX_ENTITY_ID" ]; then
              OPREF="op://${VAULT}/INCREASE_ENTITY_ID/dev"
            else
              OPREF="op://${VAULT}/${KEY}/${FIELD}"
            fi
            VALUE="$(op read "$OPREF" 2>/dev/null || true)"
            if [ -z "$VALUE" ]; then
              echo "  [skip] $KEY (no $OPREF)"
              echo "::warning::sync-secrets: skipped $KEY — no 1Password item at $OPREF"
              skipped=$((skipped + 1))
              continue
            fi
            if npx convex env set "$KEY" "$VALUE" >/dev/null 2>&1; then
              echo "  [ok]   $KEY"
              synced=$((synced + 1))
            else
              echo "  [FAIL] $KEY (convex env set failed)"
              failed=$((failed + 1))
            fi
          done

          {
            echo "## Sync Secrets → Convex"
            echo ""
            echo "- **1Password field:** \`${FIELD}\` (vault \`${VAULT}\`)"
            echo "- **Synced:** ${synced}  ·  **Skipped:** ${skipped}  ·  **Failed:** ${failed}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            echo "::error::${failed} secret(s) failed to sync to Convex."
            exit 1
          fi
