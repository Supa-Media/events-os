# Sync GitHub Environment secrets from 1Password.
#
# This is the OTHER direction from `sync-secrets.yml`, which pushes 1Password →
# the Convex deployment. This one pushes 1Password → GitHub Actions Environment
# secrets, for secrets that a *workflow* consumes at deploy time rather than the
# running Convex backend — e.g. the Cloudflare Worker deploy in
# `deploy-landing.yml` reads `CLOUDFLARE_API_TOKEN` / `CLOUDFLARE_ACCOUNT_ID`.
#
# It delegates to the framework's reusable workflow (which runs
# `supa-sync-1password-to-github`); the caller here just decides WHEN it runs and
# WHICH keys, via `.github/secrets-allowlist.json`.
#
# Prerequisites (both set BY HAND, once — they can't be synced because they're
# what authorizes the sync; this is the documented bootstrap exception in
# supa-framework/docs/SECRETS.md):
#   - `OP_SERVICE_ACCOUNT_TOKEN` (production Environment secret): read-only 1Password
#     service-account token scoped to the `Events` vault.
#   - `GH_ADMIN_TOKEN` (repository secret): a GitHub PAT with repo-admin
#     (`secrets:write`) scope — the default `GITHUB_TOKEN` cannot manage secrets.
#
# Note: each allowlisted key resolves as `op://Events/<NAME>/<environment>` BY
# TITLE, so every managed item must be uniquely titled in the vault (a duplicate
# title makes `op read` return empty and the run aborts — see the AUTH_EMAIL_FROM
# incident).
name: Sync GitHub Secrets

on:
  # Manual rotation: run after editing one of the allowlisted secrets in 1Password.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub Environment(s)"
        type: choice
        options: [production, staging, both]
        default: production
      dry-run:
        description: "Show what would change without writing"
        type: boolean
        default: false
  # Auto-sync when the set of managed keys changes (adding/removing a secret),
  # scoped to just these files so it never runs on ordinary pushes.
  push:
    branches: [main]
    paths:
      - .github/secrets-allowlist.json
      - .github/workflows/sync-github-secrets.yml

jobs:
  sync:
    uses: Supa-Media/supa-framework/.github/workflows/sync-secrets.yml@main
    with:
      vault: Events
      allowlist-path: .github/secrets-allowlist.json
      environment: ${{ github.event.inputs.environment || 'production' }}
      dry-run: ${{ github.event.inputs.dry-run == 'true' }}
    # inherit so the reusable workflow can read the production-Environment
    # OP_SERVICE_ACCOUNT_TOKEN (on the env it binds internally) and the
    # repo-level GH_ADMIN_TOKEN.
    secrets: inherit
