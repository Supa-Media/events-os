# Sync GitHub Environment secrets from 1Password (inline).
#
# The OTHER direction from `sync-secrets.yml` (which targets Convex): this
# copies 1Password -> GitHub Actions Environment secrets for creds a *workflow*
# reads at deploy time — e.g. `deploy-landing.yml`'s pw-router deploy reads
# CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID.
#
# Done INLINE (`op read` + `gh secret set`), mirroring how this repo's Convex
# `sync-secrets.yml` already reads 1Password inline. The first attempt delegated
# to the framework's reusable workflow, but that installs `@supa-media/scripts`
# from GitHub Packages, and a cross-repo reusable workflow's token can't
# authenticate to that registry without a `read:packages` PAT — so it 401'd
# before writing anything. Inline avoids the package dependency entirely.
#
# Bootstrap secrets (set by hand, once — they authorize the sync, so they can't
# be synced): OP_SERVICE_ACCOUNT_TOKEN (production Environment secret; reads
# 1Password) and GH_ADMIN_TOKEN (repo secret; a PAT with `secrets:write` — the
# default GITHUB_TOKEN can't manage secrets).
#
# Managed keys live in `.github/secrets-allowlist.json` (`required` fail the run
# if missing; `optional` are skipped). Each resolves `op://Events/<NAME>/<env>`
# BY TITLE, so every item must be UNIQUELY titled in the vault — a duplicate
# makes `op read` return empty (see the AUTH_EMAIL_FROM incident).
name: Sync GitHub Secrets

on:
  # Manual rotation: run after editing an allowlisted secret in 1Password.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub Environment / 1Password field"
        type: choice
        options: [production, staging]
        default: production
      dry-run:
        description: "Show what would change without writing"
        type: boolean
        default: false
  # Auto-sync when the managed key set changes.
  push:
    branches: [main]
    paths:
      - .github/secrets-allowlist.json
      - .github/workflows/sync-github-secrets.yml

permissions:
  contents: read

jobs:
  sync:
    name: Sync GitHub secrets (1Password -> GitHub)
    runs-on: ubuntu-latest
    # Bind the environment so ITS OP_SERVICE_ACCOUNT_TOKEN secret is readable,
    # and so `gh secret set --env` writes into this same environment.
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Sync allowlisted secrets to the GitHub Environment
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          REPO: ${{ github.repository }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
        run: |
          set -euo pipefail
          VAULT="Events"

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_ADMIN_TOKEN is not set (a PAT with secrets:write is required to manage Environment secrets)."
            exit 1
          fi

          # Parse required/optional key names from the allowlist (node is
          # preinstalled — no jq dependency, same choice as the framework).
          readarray -t REQUIRED < <(node -e 'const a=JSON.parse(require("fs").readFileSync(".github/secrets-allowlist.json","utf8"));(a.required||[]).forEach(k=>console.log(k))')
          readarray -t OPTIONAL < <(node -e 'const a=JSON.parse(require("fs").readFileSync(".github/secrets-allowlist.json","utf8"));(a.optional||[]).forEach(k=>console.log(k))')

          synced=0; skipped=0; failed=0
          sync_one() {
            KEY="$1"; IS_REQUIRED="$2"
            OPREF="op://${VAULT}/${KEY}/${ENVIRONMENT}"
            VALUE="$(op read "$OPREF" 2>/dev/null || true)"
            if [ -z "$VALUE" ]; then
              if [ "$IS_REQUIRED" = "yes" ]; then
                echo "  [FAIL] $KEY (required, but no $OPREF — is the item uniquely titled?)"
                failed=$((failed + 1))
              else
                echo "  [skip] $KEY (no $OPREF)"
                skipped=$((skipped + 1))
              fi
              return
            fi
            if [ "$DRY_RUN" = "true" ]; then
              echo "  [dry]  $KEY (would set in $ENVIRONMENT)"
              return
            fi
            # Pipe via stdin so the value never lands in a process argument.
            if printf '%s' "$VALUE" | gh secret set "$KEY" --repo "$REPO" --env "$ENVIRONMENT" --body -; then
              echo "  [ok]   $KEY"
              synced=$((synced + 1))
            else
              echo "  [FAIL] $KEY (gh secret set failed)"
              failed=$((failed + 1))
            fi
          }

          for KEY in "${REQUIRED[@]:-}"; do [ -n "$KEY" ] && sync_one "$KEY" yes; done
          for KEY in "${OPTIONAL[@]:-}"; do [ -n "$KEY" ] && sync_one "$KEY" no; done

          {
            echo "## Sync GitHub secrets"
            echo ""
            echo "- **Environment:** \`$ENVIRONMENT\`  (1Password vault \`$VAULT\`)"
            echo "- **Synced:** $synced  ·  **Skipped:** $skipped  ·  **Failed:** $failed"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed secret(s) failed to sync."
            exit 1
          fi
