# Deploy the Convex backend to PRODUCTION on every merge to `main`.
#
# Single environment by design (no staging, for now): a push to main that
# touches the backend deploys straight to the production Convex deployment.
#
# This mirrors the Supa-Media/supa-framework deploy-convex pattern
# (install → typecheck → deploy) but is kept self-contained because this backend
# installs `@supa-media/convex` from GitHub Packages, which needs GITHUB_TOKEN
# wired into `pnpm install` — not handled by the generic reusable workflow.
name: Deploy Convex (production)

on:
  push:
    branches: [main]
    paths:
      - "apps/convex/**"
      - "packages/shared/**"
      - "convex.json"
  # Allow a manual run from the Actions tab (e.g. first deploy / re-deploy).
  workflow_dispatch:

# Never run two production deploys at once.
concurrency:
  group: convex-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Convex (production)
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Install ONLY the backend and its deps (@events-os/shared + the public
      # @supa-media/convex). Scoping avoids the app's other private @supa-media/*
      # packages, so they can stay private without blocking the deploy.
      # GITHUB_TOKEN still authenticates the registry for @supa-media/convex.
      - name: Install backend dependencies
        run: pnpm install --filter @events-os/convex... --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Type check Convex functions
        run: npx convex typecheck

      - name: Deploy to Convex (production)
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      # Self-applying migrations: the runner walks the ordered MIGRATIONS
      # registry and runs only those absent from the `schemaMigrations` ledger,
      # so this is a no-op when nothing is pending and never re-runs history.
      # (Local equivalent: `npx convex run migrations:runPending`.)
      - name: Apply pending migrations (post-deploy)
        run: npx convex run migrations:runPending
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "## Convex production deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
